app:
  name: kms-bot
  env: local
  debug: false
  pipeline_version: 1

server:
  host: 0.0.0.0
  port: 8000
  api_prefix: /api

logging:
  level: INFO
  json: false

storage:
  data_root: ./data
  raw_dir: ./data/raw
  cleaned_dir: ./data/cleaned
  chunks_dir: ./data/chunks
  sqlite_dir: ./data/sqlite
  logs_dir: ./data/logs

database:
  url: sqlite:///./data/sqlite/kmsbot.db

confluence:
  base_url: https://example.atlassian.net/wiki
  space_key: KMS
  username: ""
  api_token: ""
  page_limit: 25

search:
  # provider: "azure_ai_search" | "sqlite_fts5"
  # sqlite_fts5 - 零依赖本地全文搜索，无需任何云服务，适合开发/测试
  # azure_ai_search - 需要填写下方 endpoint / api_key
  provider: sqlite_fts5
  endpoint: ""
  api_key: ""
  index_name: kmsbot-chunks

answer:
  endpoint: ""
  api_key: ""
  chat_deployment: ""

query:
  top_k: 5
  include_debug: false
  max_chunks_per_doc: 3
  similarity_threshold: 0.85

prompts:
  query_answering: prompts/query_answering/default.md
  query_rewrite: prompts/query_rewrite/default.md
