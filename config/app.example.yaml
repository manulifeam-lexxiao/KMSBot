app:
  name: kms-bot
  env: local
  debug: false
  pipeline_version: 1

server:
  host: 0.0.0.0
  port: 8000
  api_prefix: /api

logging:
  level: INFO
  json: false

storage:
  data_root: ./data
  raw_dir: ./data/raw
  cleaned_dir: ./data/cleaned
  chunks_dir: ./data/chunks
  sqlite_dir: ./data/sqlite
  logs_dir: ./data/logs

database:
  url: sqlite:///./data/sqlite/kmsbot.db

confluence:
  base_url: https://example.atlassian.net/wiki
  space_key: KMS
  username: ""
  api_token: ""
  page_limit: 25

search:
  endpoint: ""
  api_key: ""
  index_name: kmsbot-chunks

answer:
  endpoint: ""
  api_key: ""
  chat_deployment: ""

query:
  top_k: 5
  include_debug: false

prompts:
  query_answering: prompts/query_answering/default.md
  query_rewrite: prompts/query_rewrite/default.md
