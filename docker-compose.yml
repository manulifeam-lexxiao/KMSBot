services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    volumes:
      # 持久化数据目录（raw / cleaned / chunks / sqlite / logs）
      - ./data:/app/data
      # 挂载本地 config（可覆盖容器内默认值）
      - ./config:/app/config:ro
    environment:
      KMSBOT_DATA_ROOT: /app/data
      KMSBOT_DATABASE_URL: "sqlite:////app/data/sqlite/kmsbot.db"
      KMSBOT_CONFIG_FILE: /app/config/app.yaml
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
